name: Server Build

on:
  push:
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build + test + fat JAR
        run: gradle test shadowJar --no-daemon --stacktrace

      - name: Upload server JAR
        uses: actions/upload-artifact@v4
        with:
          name: musicserver-jar
          path: server/build/libs/musicserver.jar
          if-no-files-found: error
