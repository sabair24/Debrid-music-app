name: Build & Release APK

on:
  push:
    branches: [ "main", "claude/flac-music-android-tv-6dO6z" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 35
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK with version info
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          BUILD=${{ github.run_number }}
          BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's|/|-|g')
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/DebridMusic-v${VERSION}-build${BUILD}-debug.apk
          echo "APK_NAME=DebridMusic-v${VERSION}-build${BUILD}-debug.apk" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debrid-music-debug-build${{ github.run_number }}
          path: app/build/outputs/apk/debug/${{ env.APK_NAME }}
          retention-days: 30

      # Publishes only the built APK to a SEPARATE PUBLIC repo so the in-app
      # updater can read releases and download the APK without authentication,
      # while this source repo stays private.
      # One-time setup required (see repo README / setup notes):
      #   1. Create a public repo: sabair24/Debrid-music-app-releases
      #   2. Create a Personal Access Token with "contents: write" on it
      #   3. Add it here as the secret RELEASES_TOKEN
      - name: Publish APK to public releases repo
        if: github.ref == 'refs/heads/main' && env.RELEASES_TOKEN != ''
        env:
          RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        uses: softprops/action-gh-release@v2
        with:
          repository: sabair24/Debrid-music-app-releases
          token: ${{ secrets.RELEASES_TOKEN }}
          tag_name: v${{ env.VERSION }}-build${{ github.run_number }}
          name: "Debrid Music v${{ env.VERSION }} (build ${{ github.run_number }})"
          body: |
            ## Debrid Music v${{ env.VERSION }} (build ${{ github.run_number }})

            Android music app — TorBox debrid + Soulseek P2P.

            ### Install
            Download the APK below and sideload on your Android device or TV.
            From a build with the in-app updater installed, future updates are
            one tap inside the app (Settings → App-updates).

            > You may need to enable "Install from unknown sources" on your device.
          draft: false
          prerelease: false
          files: app/build/outputs/apk/debug/${{ env.APK_NAME }}
